controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    l_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    head_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    r_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

l_arm_controller:
  ros__parameters:
    joints:
      - l_shoulder_pitch
      - l_shoulder_roll
      - l_elbow_yaw
      - l_elbow_pitch
      - l_wrist_roll
      - l_wrist_pitch
      - l_wrist_yaw
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
head_controller:
  ros__parameters:
    joints:
      - neck_roll
      - neck_pitch
      - neck_yaw
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
r_arm_controller:
  ros__parameters:
    joints:
      - r_shoulder_pitch
      - r_shoulder_roll
      - r_elbow_yaw
      - r_elbow_pitch
      - r_wrist_roll
      - r_wrist_pitch
      - r_wrist_yaw
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity