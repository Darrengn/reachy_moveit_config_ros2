# MoveIt uses this configuration for controller management

moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

moveit_simple_controller_manager:
  controller_names:
    - l_arm_controller
    - head_controller
    - r_arm_controller

  l_arm_controller:
    type: FollowJointTrajectory
    joints:
      - l_shoulder_pitch
      - l_shoulder_roll
      - l_elbow_yaw
      - l_elbow_pitch
      - l_wrist_roll
      - l_wrist_pitch
      - l_wrist_yaw
  head_controller:
    type: FollowJointTrajectory
    joints:
      - neck_roll
      - neck_pitch
      - neck_yaw
  r_arm_controller:
    type: FollowJointTrajectory
    joints:
      - r_shoulder_pitch
      - r_shoulder_roll
      - r_elbow_yaw
      - r_elbow_pitch
      - r_wrist_roll
      - r_wrist_pitch
      - r_wrist_yaw